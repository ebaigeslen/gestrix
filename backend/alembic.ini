# Alembic configuration for the Gestrix backend.
#
# The database URL is intentionally NOT set here. It is resolved at runtime by
# migrations/env.py from app.config.Settings (DATABASE_URL), or overridden via
# the programmatic helpers in app.db.migrate. This keeps a single source of
# truth for the URL and lets the app boot a ready DB without manual config.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# sqlalchemy.url is supplied by env.py / app.db.migrate (see note above).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
